<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Precision Bot - GoldAPI Edition</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #070b18; color: #d7e3f7; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        #chart { width: 100%; height: 350px; border-radius: 8px; border: 1px solid #1f2e4d; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .card { background: #0d1528; padding: 15px; border-radius: 8px; border: 1px solid #1f2e4d; }
        .highlight { color: #facc15; font-weight: bold; }
    </style>
</head>
<body>

    <h3>📊 Precision Bot: XAU/USD (GoldAPI)</h3>
    <div id="chart"></div>
    <div class="dashboard">
        <div class="card">
            <b>Status Indikator:</b>
            <div id="tech-data">Memuat data dari GoldAPI...</div>
        </div>
        <div class="card">
            <b>Sinyal Telegram:</b>
            <div id="signal-data">Menunggu...</div>
        </div>
    </div>

<script>
// --- KONFIGURASI ---
const GOLD_API_KEY = "5ad5d6e03a39f873e8b034e11aeae5576f908a194791ed4f329c75cfd8c865ae";
const BOT_TOKEN = "8836175625:AAFFi3YHh9g_Jv4g41x_iBViTutub0P2Ptk";
const CHAT_ID = "216247474";

let dataHistory = [];
let lastSignal = "";

// --- SETUP GRAFIK ---
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: { backgroundColor: '#070b18', textColor: '#DDD' },
    width: document.body.clientWidth - 30, height: 350
});
const candleSeries = chart.addCandlestickSeries();

// --- LOGIKA PERHITUNGAN ---
function calculateIndicators(data) {
    const len = data.length;
    if (len < 20) return null;
    const closes = data.map(d => d.close);
    
    const k = 2 / 21;
    let ema = closes[0];
    for (let i = 1; i < len; i++) ema = (closes[i] * k) + (ema * (1 - k));

    const slice20 = closes.slice(-20);
    const mean = slice20.reduce((a, b) => a + b) / 20;
    const stdDev = Math.sqrt(slice20.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / 20);

    return { 
        ema20: ema.toFixed(2), 
        bbUpper: (mean + (stdDev * 2)).toFixed(2),
        bbLower: (mean - (stdDev * 2)).toFixed(2),
        price: closes[len - 1]
    };
}

// --- TELEGRAM ---
function kirimKeTelegram(pesan) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}`)
    .catch(err => console.error(err));
}

// --- ENGINE UTAMA ---
async function updateEngine() {
    try {
        const res = await fetch('https://www.goldapi.io/api/XAU/USD', {
            headers: { "x-access-token": GOLD_API_KEY, "Content-Type": "application/json" }
        });
        const data = await res.json();
        const price = data.price;
        
        const newData = { 
            time: Math.floor(Date.now() / 1000), 
            open: price, high: price + 0.2, low: price - 0.2, close: price,
            volume: 1000 
        };
        
        dataHistory.push(newData);
        if (dataHistory.length > 100) dataHistory.shift();
        candleSeries.update(newData);

        const stats = calculateIndicators(dataHistory);
        if (stats) {
            document.getElementById('tech-data').innerHTML = `
                Harga: $${stats.price}<br>EMA20: ${stats.ema20}<br>
                BB: ${stats.bbUpper} / ${stats.bbLower}
            `;
            
            let currentSignal = "";
            if (stats.price < stats.bbLower) currentSignal = "🟢 BUY (Oversold)";
            else if (stats.price > stats.bbUpper) currentSignal = "🔴 SELL (Overbought)";

            if (currentSignal !== "" && currentSignal !== lastSignal) {
                lastSignal = currentSignal;
                document.getElementById('signal-data').innerHTML = `<span class="highlight">${currentSignal}</span>`;
                kirimKeTelegram(`[SIGNAL] XAU/USD: ${currentSignal} | Harga: $${stats.price}`);
            }
        }
    } catch (e) { 
        document.getElementById('tech-data').innerText = "Gagal memuat data. Periksa koneksi atau limit API."; 
    }
}

setInterval(updateEngine, 30000); 
updateEngine();
</script>
</body>
</html>
