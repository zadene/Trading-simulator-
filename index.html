<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Precision Bot</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #070b18; color: #d7e3f7; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        #chart { width: 100%; height: 400px; border-radius: 8px; border: 1px solid #1f2e4d; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #0d1528; padding: 15px; border-radius: 10px; border: 1px solid #1f2e4d; }
        .highlight { color: #facc15; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📊 XAUUSD Realtime Precision Bot</h1>
    <div id="chart"></div>
    <div class="dashboard">
        <div class="card">
            <h3>⚙️ Status Indikator</h3>
            <div id="tech-data">Memuat data...</div>
        </div>
        <div class="card">
            <h3>🎯 Sinyal Terbaru</h3>
            <div id="signal-data" style="font-size: 1.4em;">Menunggu filter volume...</div>
        </div>
    </div>

<script>
// --- KONFIGURASI ---
const BOT_TOKEN = "8836175625:AAFFi3YHh9g_Jv4g41x_iBViTutub0P2Ptk";
const CHAT_ID = "216247474";
let lastSignal = "";

// --- SETUP GRAFIK ---
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: { backgroundColor: '#070b18', textColor: '#DDD' },
    width: document.body.clientWidth - 40, height: 400
});
const candleSeries = chart.addCandlestickSeries();
let dataHistory = [];

// --- LOGIKA PERHITUNGAN ---
function calculateIndicators(data) {
    const len = data.length;
    if (len < 20) return null;

    const closes = data.map(d => d.close);
    const volumes = data.map(d => d.volume);
    
    // EMA 20
    const k = 2 / 21;
    let ema = closes[0];
    for (let i = 1; i < len; i++) ema = (closes[i] * k) + (ema * (1 - k));

    // Bollinger Bands
    const slice20 = closes.slice(-20);
    const mean = slice20.reduce((a, b) => a + b) / 20;
    const stdDev = Math.sqrt(slice20.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / 20);

    // Volume Filter
    const avgVol = volumes.slice(-20).reduce((a, b) => a + b) / 20;
    const volRatio = volumes[len - 1] / avgVol;

    return { 
        ema20: ema.toFixed(2), 
        bbUpper: (mean + (stdDev * 2)).toFixed(2),
        bbLower: (mean - (stdDev * 2)).toFixed(2),
        price: closes[len - 1],
        isHighVolume: volRatio > 1.2
    };
}

// --- TELEGRAM ---
function kirimKeTelegram(pesan) {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}`;
    fetch(url).catch(err => console.error("Gagal kirim:", err));
}

// --- ENGINE UTAMA ---
async function updateEngine() {
    try {
        const res = await fetch('https://api.exchange.coin-stats.com/v1/ticker/xauusd');
        const raw = await res.json();
        
        const newData = { 
            time: Math.floor(Date.now() / 1000), 
            open: raw.price - 0.2, high: raw.price + 0.3, 
            low: raw.price - 0.3, close: raw.price,
            volume: Math.random() * 1000 
        };
        
        dataHistory.push(newData);
        if (dataHistory.length > 100) dataHistory.shift();
        candleSeries.update(newData);

        const stats = calculateIndicators(dataHistory);
        if (stats) {
            document.getElementById('tech-data').innerHTML = `
                Harga: ${stats.price}<br>EMA 20: ${stats.ema20}<br>
                BB Upper: ${stats.bbUpper}<br>BB Lower: ${stats.bbLower}
            `;
            
            if (stats.isHighVolume) {
                let currentSignal = "";
                if (stats.price < stats.bbLower) currentSignal = "🟢 BUY (Oversold)";
                else if (stats.price > stats.bbUpper) currentSignal = "🔴 SELL (Overbought)";

                if (currentSignal !== "" && currentSignal !== lastSignal) {
                    lastSignal = currentSignal;
                    document.getElementById('signal-data').innerHTML = `<span class="highlight">${currentSignal}</span>`;
                    kirimKeTelegram(`[SIGNAL] XAUUSD: ${currentSignal} | Harga: ${stats.price}`);
                }
            }
        }
    } catch (e) { console.error("Error Engine:", e); }
}

setInterval(updateEngine, 1000);
updateEngine();
</script>
</body>
</html>
