<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Live Monitor</title>
    <style>
        body { background: #070b18; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #0d1528; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>📊 Monitor XAU/USD</h3>
    <div class="card" id="status">Menghubungkan ke GoldAPI...</div>
    <div class="card" id="signal">Sinyal: Menunggu...</div>

<script>
const GOLD_API_KEY = "5ad5d6e03a39f873e8b034e11aeae5576f908a194791ed4f329c75cfd8c865ae";
const BOT_TOKEN = "8836175625:AAFFi3YHh9g_Jv4g41x_iBViTutub0P2Ptk";
const CHAT_ID = "216247474";

async function checkPrice() {
    try {
        const response = await fetch('https://www.goldapi.io/api/XAU/USD', {
            headers: { "x-access-token": GOLD_API_KEY, "Content-Type": "application/json" }
        });
        
        const data = await response.json();
        
        if(data.price) {
            document.getElementById('status').innerHTML = `<b>Harga Saat Ini: $${data.price}</b>`;
            // Logika sederhana untuk mengetes sinyal
            if(data.price > 2300) {
                document.getElementById('signal').innerHTML = "Sinyal: Analisa Aktif";
            }
        } else {
            document.getElementById('status').innerText = "Data tidak ditemukan (Cek API Key)";
        }
    } catch (e) {
        document.getElementById('status').innerText = "Error Koneksi: " + e.message;
    }
}

// Cek harga setiap 15 detik
setInterval(checkPrice, 15000);
checkPrice();
</script>
</body>
</html>
