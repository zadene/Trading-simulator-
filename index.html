<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Trading Simulator - Full System</title>
    <style>
        :root { --bg: #0c0d14; --card: #131722; --border: #2a2e39; --text: #e1e3eb; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .tv-chart { height: 500px; width: 100%; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .val { font-weight: bold; color: #26a69a; }
        .btn { padding: 10px; width: 100%; border: none; cursor: pointer; color: white; border-radius: 4px; margin-top: 5px; }
        .btn-buy { background: #26a69a; } .btn-sell { background: #ef5350; }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="grid">
    <main>
        <div class="card"><div id="tradingview_widget" class="tv-chart"></div></div>
    </main>
    <aside>
        <div class="card">
            <h3>Panel Eksekusi</h3>
            <select id="pair" style="width: 100%; padding: 8px; margin-bottom: 10px;">
                <option value="OANDA:XAUUSD">XAU/USD (Gold)</option>
                <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                <option value="BINANCE:ETHUSDT">ETH/USDT</option>
            </select>
            <input type="number" id="size" value="0.1" style="width: 100%; padding: 8px;">
            <button class="btn btn-buy" onclick="execute('BUY')">BELI (LONG)</button>
            <button class="btn btn-sell" onclick="execute('SELL')">JUAL (SHORT)</button>
            <div class="metrics">
                <div>Saldo: <span id="bal" class="val">$10,000</span></div>
                <div>Status: <span id="stat">Aktif</span></div>
            </div>
            <div id="logs" style="margin-top: 15px; font-size: 0.7rem; height: 150px; overflow-y: auto; border-top: 1px solid var(--border);"></div>
        </div>
    </aside>
</div>

<script>
(function() {
    let state = { balance: 10000, activePos: [] };

    function log(msg) {
        const l = document.getElementById("logs");
        l.innerHTML = `<div>${new Date().toLocaleTimeString()}: ${msg}</div>` + l.innerHTML;
    }

    window.initChart = function(symbol) {
        document.getElementById("tradingview_widget").innerHTML = "";
        new TradingView.widget({
            "container_id": "tradingview_widget",
            "symbol": symbol,
            "theme": "dark",
            "interval": "1",
            "height": 500,
            "width": "100%"
        });
        log("Pasangan diubah ke: " + symbol);
    };

    window.execute = function(type) {
        const size = parseFloat(document.getElementById("size").value);
        state.balance -= (size * 0.05); // Simulasi Fee
        log(`Posisi ${type} dibuka sebesar ${size}.`);
        document.getElementById("bal").innerText = "$" + state.balance.toFixed(2);
    };

    document.getElementById("pair").addEventListener("change", (e) => initChart(e.target.value));
    
    // Inisialisasi
    initChart("OANDA:XAUUSD");
    log("Sistem Trading Online.");
})();
</script>
</body>
</html>
