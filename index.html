
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Trading Dashboard</title>
    <style>
        :root { --bg: #0b1220; --panel: #161d2b; --text: #e0e0e0; --accent: #2962ff; }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: sans-serif; }
        .container { display: grid; grid-template-columns: 300px 1fr; gap: 10px; padding: 10px; }
        .panel { background: var(--panel); padding: 15px; border-radius: 8px; }
        select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: none; }
        #chart-container { height: 500px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <select id="simbol">
            <optgroup label="🪙 KOMODITI">
                <option value="OANDA:XAUUSD">OANDA:XAUUSD - Emas / USD</option>
                <option value="OANDA:XAGUSD">OANDA:XAGUSD - Perak / USD</option>
                <option value="OANDA:XPTUSD">OANDA:XPTUSD - Platina</option>
                <option value="OANDA:XPDUSD">OANDA:XPDUSD - Paladium</option>
                <option value="OANDA:BCOUSD">OANDA:BCOUSD - Minyak Brent</option>
                <option value="OANDA:WTICOUSD">OANDA:WTICOUSD - Minyak WTI</option>
                <option value="OANDA:NATGASUSD">OANDA:NATGASUSD - Gas Alam</option>
            </optgroup>
            <optgroup label="💱 FOREX">
                <option value="OANDA:EURUSD">EURUSD</option><option value="OANDA:GBPUSD">GBPUSD</option>
                <option value="OANDA:USDJPY">USDJPY</option><option value="OANDA:AUDUSD">AUDUSD</option>
                <option value="OANDA:NZDUSD">NZDUSD</option><option value="OANDA:USDCAD">USDCAD</option>
                <option value="OANDA:USDCHF">USDCHF</option><option value="OANDA:EURGBP">EURGBP</option>
                <option value="OANDA:EURJPY">EURJPY</option><option value="OANDA:GBPJPY">GBPJPY</option>
                <option value="OANDA:AUDJPY">AUDJPY</option><option value="OANDA:EURCHF">EURCHF</option>
                <option value="OANDA:GBPCHF">GBPCHF</option><option value="OANDA:AUDCAD">AUDCAD</option>
                <option value="OANDA:CADJPY">CADJPY</option><option value="OANDA:USDCNH">USDCNH</option>
                <option value="OANDA:USDHKD">USDHKD</option><option value="OANDA:USDSGD">USDSGD</option>
                <option value="OANDA:USDIDR">USDIDR</option>
            </optgroup>
            <optgroup label="🪙 KRIPTO">
                <option value="BINANCE:BTCUSDT">BINANCE:BTCUSDT</option>
                <option value="BINANCE:ETHUSDT">BINANCE:ETHUSDT</option>
                <option value="BINANCE:BNBUSDT">BINANCE:BNBUSDT</option>
                <option value="BINANCE:SOLUSDT">BINANCE:SOLUSDT</option>
                <option value="BINANCE:XRPUSDT">BINANCE:XRPUSDT</option>
            </optgroup>
            <optgroup label="📈 INDEKS DUNIA">
                <option value="SP:SPX">SP:SPX S&P500</option>
                <option value="NASDAQ:NDX">NASDAQ:NDX Nasdaq100</option>
                <option value="INDEX:DJI">INDEX:DJI DowJones</option>
                <option value="INDEX:VIX">INDEX:VIX</option>
                <option value="TVC:UKX">TVC:UKX FTSE</option>
                <option value="TVC:DAX">TVC:DAX</option>
                <option value="TVC:HSI">TVC:HSI</option>
                <option value="TVC:NIK">TVC:NIK</option>
                <option value="IDX:COMPOSITE">IDX:COMPOSITE IHSG</option>
            </optgroup>
            <optgroup label="🇮🇩 SAHAM IDX">
                <option value="IDX:BBRI">IDX:BBRI</option><option value="IDX:BBCA">IDX:BBCA</option>
                <option value="IDX:BMRI">IDX:BMRI</option><option value="IDX:BBNI">IDX:BBNI</option>
                <option value="IDX:ASII">IDX:ASII</option><option value="IDX:TLKM">IDX:TLKM</option>
                <option value="IDX:UNVR">IDX:UNVR</option><option value="IDX:GOTO">IDX:GOTO</option>
                <option value="IDX:BRPT">IDX:BRPT</option><option value="IDX:INDF">IDX:INDF</option>
                <option value="IDX:PTBA">IDX:PTBA</option><option value="IDX:HRUM">IDX:HRUM</option>
                <option value="IDX:MEDC">IDX:MEDC</option><option value="IDX:SMGR">IDX:SMGR</option>
                <option value="IDX:ICBP">IDX:ICBP</option>
            </optgroup>
            <optgroup label="🇺🇸 SAHAM AS">
                <option value="NASDAQ:AAPL">NASDAQ:AAPL</option><option value="NASDAQ:MSFT">NASDAQ:MSFT</option>
                <option value="NASDAQ:GOOGL">NASDAQ:GOOGL</option><option value="NASDAQ:AMZN">NASDAQ:AMZN</option>
                <option value="NASDAQ:NVDA">NASDAQ:NVDA</option><option value="NASDAQ:META">NASDAQ:META</option>
                <option value="NASDAQ:TSLA">NASDAQ:TSLA</option><option value="NYSE:JPM">NYSE:JPM</option>
            </optgroup>
        </select>
        <div id="stats">
            <p>Winrate: <span id="winrate">--</span>%</p>
            <button id="toggleTrade">⚡ AUTO TRADE OFF</button>
        </div>
    </div>
    <div id="chart-container" class="panel"></div>
</div>

<script>
    (function() {
        // STATE TERPUSAT (Hanya 1 Global)
        const AppState = {
            symbol: 'OANDA:XAUUSD',
            isAutoTrade: false,
            balance: 10000,
            winrate: 0
        };

        const Modules = {
            UI: {
                init() {
                    const select = document.getElementById('simbol');
                    select.addEventListener('change', (e) => {
                        AppState.symbol = e.target.value;
                        this.renderChart();
                    });
                    this.renderChart();
                },
                renderChart() {
                    const container = document.getElementById('chart-container');
                    container.innerHTML = `<!-- TradingView Widget Embed Placeholder -->
                    <div style="width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;">
                        TradingView: ${AppState.symbol}
                    </div>`;
                }
            },
            DataEngine: {
                async fetchPrice(symbol) {
                    if (symbol.startsWith('BINANCE:')) {
                        try {
                            // Simulasi fetch Binance
                            return { price: Math.random() * 100 };
                        } catch (e) { return null; }
                    } else {
                        // Harga Realistis Berbasis Seed
                        return { price: Math.random() * 50 };
                    }
                }
            }
        };

        // Inisialisasi
        Modules.UI.init();
    })();
</script>
</body>
</html>
